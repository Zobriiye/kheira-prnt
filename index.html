<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="ticket" id="ticket">

        <p id="companyName"></p>
        <p id="date" style="display:none"></p>
        <p id="customer"></p>

        <hr class="divider">

        <table>
            <thead>
                <tr>
                    <th class="quantity">Qty</th>
                    <th class="description">Item</th>
                    <th id="lbpColumn" class="price">ل.ل</th>
                    <th id="usdColumn" class="price">$</th>
                </tr>
            </thead>
            <tbody id="tableBod"></tbody>
        </table>

        <hr class="divider">

        <div id="potsSection">
            <table>
                <tbody>
                    <tr>
                        <td style="text-align:right; width:50%; font-weight:600; font-size:10px;">Pots Remaining</td>
                        <td style="text-align:center; width:25%; font-size:10px;" id="potsRemainingLarge"></td>
                        <td style="text-align:center; width:25%; font-size:10px;" id="potsRemainingMedium"></td>
                    </tr>
                </tbody>
            </table>
            <hr class="divider">
        </div>

        <table class="totals-table">
            <tbody>
                <tr id="lbpTotalRow">
                    <td>Total</td>
                    <td id="totalpricelbp"></td>
                </tr>
                <tr id="usdTotalRow">
                    <td>Total</td>
                    <td id="totalpriceusd"></td>
                </tr>
            </tbody>
        </table>

        <div id="paidLeftSection">
            <hr class="divider">
            <table class="totals-table">
                <tbody>
                    <tr>
                        <td>Amount Paid</td>
                        <td id="amountPaid"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td id="amountPaidLbp"></td>
                    </tr>
                    <tr>
                        <td>Amount Left</td>
                        <td id="amountLeft"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <hr class="divider">
        <p class="footer-thanks">Thank You</p>
        <p id="phoneNumber"></p>
        <p class="footer-line">- - - - - - - -</p>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
