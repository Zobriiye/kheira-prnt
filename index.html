<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <div class="ticket" id="ticket">
        <p class="centered" id="companyName"></p>
        <p class="centered" id="date" style="display:none"></p>
        <p class="centered" id="customer"></p>

        <table>
            <thead>
                <tr>
                    <th class="quantity">Q.</th>
                    <th class="description">Description</th>
                    <th class="price">Unit $</th>
                    <th class="price">Total $</th>
                </tr>
            </thead>
            <tbody id="tableBod"></tbody>
        </table>

        <div id="potsSection" class="centered">
            <table>
                <tbody>
                    <tr>
                        <td style="width:50%;" class="price">Pots Remaining</td>
                        <td style="width:25%;" class="description" id="potsRemainingLarge"></td>
                        <td style="width:25%;" class="description" id="potsRemainingMedium"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="centered">
            <table>
                <tbody>
                    <tr id="usdTotalRow">
                        <td>Total $</td>
                        <td id="totalpriceusd"></td>
                    </tr>
                    <tr id="lbpTotalRow">
                        <td>Total LL</td>
                        <td id="totalpricelbp"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <p class="centered">Thank you.</p>
        <p class="centered" id="phoneNumber">Contact 76 / 376 048</p>
        <hr class="end-line" />
    </div>

    <script src="index.js"></script>
</body>
</html>
